<mat-card>
  <mat-card-header>
    <mat-card-title>AI Legal Assistant</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="messages" #messagesContainer>
      @for (msg of messages; track trackByIndex($index)) {
        <div class="message" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
          <div class="bubble">{{ msg.content }}</div>
        </div>
      }
      @if (loading) {
        <div class="message assistant">
          <div class="bubble typing">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      }
    </div>

    <div class="input-area">
      <mat-form-field appearance="outline" class="chat-input">
        <mat-label>Type your message...</mat-label>
        <textarea
          matInput
          [(ngModel)]="userInput"
          (keydown)="onKeydown($event)"
          [disabled]="loading"
          rows="2"
          cdkTextareaAutosize
        ></textarea>
      </mat-form-field>
      <button
        mat-fab
        color="primary"
        (click)="onSend()"
        [disabled]="!userInput.trim() || loading"
        class="send-button"
      >
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
